name: WeTouch Proxy
on:
  repository_dispatch:
    types: [send-otp, verify-otp]

permissions:
  contents: write

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Call WeTouch API
        env:
          EVENT: ${{ github.event.action }}
          REQ_ID: ${{ github.event.client_payload.requestId }}
          CAPTCHA: ${{ github.event.client_payload.captchaToken }}
          OTP: ${{ github.event.client_payload.otpCode }}
        run: |
          TOKEN="9fa96a55ceb8d6c9160abcd74e1f62e7"
          
          if [ "$EVENT" = "send-otp" ]; then
            BODY="event=sendCode&from=register&countryCode=852&number=59144693&captchaToken=${CAPTCHA}"
          else
            BODY="event=chkCode&from=register&code=${OTP}&mobile=85259144693"
          fi
          
          RESULT=$(curl -sk --connect-timeout 20 \
            -X POST "https://api.wetouch.me/file/setMobile.php" \
            -H "VERSION: 707" -H "DEVICE: android" -H "PHONEIMEI: 123456789012345" \
            -H "LOCALE: en" -H "TOKEN: ${TOKEN}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "User-Agent: okhttp/4.9.3" \
            -d "${BODY}")
          
          echo "API Result: $RESULT"
          mkdir -p results
          echo "$RESULT" > "results/${REQ_ID}.json"
          
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add "results/${REQ_ID}.json"
          git commit -m "result:${REQ_ID}"
          git push
