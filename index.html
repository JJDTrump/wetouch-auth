<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>WeTouch Auth</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,monospace;max-width:420px;margin:0 auto;padding:15px;background:#0d1117;color:#58a6ff;min-height:100vh}
h2{text-align:center;color:#58a6ff;margin:20px 0;font-size:18px}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;margin:15px 0}
.lbl{color:#8b949e;font-size:13px;margin-bottom:6px}
.val{color:#e6edf3;font-size:14px;word-break:break-all;padding:10px;background:#0d1117;border-radius:6px;border:1px solid #30363d}
button{width:100%;padding:14px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin:8px 0}
button:disabled{opacity:.5;cursor:not-allowed}
button.sec{background:#21262d;border:1px solid #30363d;color:#e6edf3}
.st{padding:10px;border-radius:6px;font-size:13px;margin:8px 0;text-align:center;word-break:break-all}
.ok{background:#0d2818;border:1px solid #238636;color:#3fb950}
.er{background:#2d1117;border:1px solid #f85149;color:#f85149}
.wn{background:#1f1d0e;border:1px solid #bb8009;color:#d29922}
input[type=tel]{width:100%;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:24px;text-align:center;letter-spacing:6px;margin:8px 0}
input:focus{outline:none;border-color:#58a6ff}
.step{display:none}
.active{display:block}
pre{white-space:pre-wrap;word-break:break-all;font-size:11px;color:#3fb950;background:#0d1117;padding:10px;border-radius:6px;border:1px solid #30363d;min-height:80px;margin:0}
</style>
</head>
<body>
<h2>WeTouch Auth Helper</h2>

<div id="s1" class="step active">
<div class="card">
<div class="lbl">Target</div>
<div class="val">+852 59144693</div>
</div>
<div class="card">
<div class="lbl">Step 1 — Send OTP</div>
<p style="color:#8b949e;font-size:13px;margin:0 0 10px">reCAPTCHA runs invisibly. OTP sent to +852 59144693.</p>
<div id="st1" class="st wn">Ready</div>
<button id="btn1" onclick="doStep1()">SEND OTP →</button>
</div>
</div>

<div id="s2" class="step">
<div class="card">
<div class="lbl">Step 2 — Enter OTP from SMS</div>
<input type="tel" id="otp" placeholder="123456" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
<div id="st2" class="st wn">Enter OTP then verify</div>
<button id="btn2" onclick="doStep2()">VERIFY OTP →</button>
</div>
</div>

<div id="s3" class="step">
<div class="card">
<div class="lbl">Step 3 — Copy this result</div>
<pre id="resp">...</pre>
<button onclick="doCopy()">COPY ALL</button>
<button class="sec" onclick="location.reload()">Restart</button>
</div>
</div>

<script src="https://www.google.com/recaptcha/enterprise.js?render=6LdrBgMsAAAAAK6Qq0c_-AnjXZhcIKjoV5WgnqGA"></script>
<script>
const SITEKEY = '6LdrBgMsAAAAAK6Qq0c_-AnjXZhcIKjoV5WgnqGA';
const API = 'https://api.wetouch.me';
const PROXY = 'https://cors-anywhere.herokuapp.com/';
const HDR = {
  'VERSION': '707',
  'DEVICE': 'android',
  'PHONEIMEI': '123456789012345',
  'LOCALE': 'en',
  'TOKEN': '9fa96a55ceb8d6c9160abcd74e1f62e7',
  'Content-Type': 'application/x-www-form-urlencoded',
  'X-Requested-With': 'XMLHttpRequest'
};

function show(id) {
  document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function ss(id, msg, c) {
  var e = document.getElementById(id);
  e.textContent = msg;
  e.className = 'st ' + c;
}

async function getRC(action) {
  return new Promise((res, rej) => {
    if (typeof grecaptcha === 'undefined' || !grecaptcha.enterprise) {
      rej(new Error('reCAPTCHA not loaded'));
      return;
    }
    grecaptcha.enterprise.ready(async () => {
      try { res(await grecaptcha.enterprise.execute(SITEKEY, {action})); }
      catch(e) { rej(e); }
    });
  });
}

async function doStep1() {
  const btn = document.getElementById('btn1');
  btn.disabled = true;
  ss('st1', 'Getting reCAPTCHA token...', 'wn');

  let rc = '';
  try {
    rc = await Promise.race([
      getRC('sms'),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000))
    ]);
    ss('st1', 'reCAPTCHA OK ✓', 'ok');
  } catch(e) {
    ss('st1', 'reCAPTCHA failed: ' + e.message + ' — trying anyway', 'er');
  }

  const body = 'event=sendCode&from=register&countryCode=852&number=59144693&captchaToken=' + encodeURIComponent(rc);

  // Try 1: direct fetch with full headers
  try {
    const r = await Promise.race([
      fetch(API + '/file/setMobile.php', {method: 'POST', headers: HDR, body}),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 12000))
    ]);
    const t = await r.text();
    ss('st1', 'Server: ' + t.substring(0, 100), t.includes('"0"') || t.includes(':0,') ? 'ok' : 'wn');
    setTimeout(() => show('s2'), 2000);
    btn.disabled = false;
    return;
  } catch(e1) {
    ss('st1', 'Direct failed (' + e1.message + '), trying proxy...', 'wn');
  }

  // Try 2: via cors-anywhere proxy
  try {
    const r2 = await Promise.race([
      fetch(PROXY + API + '/file/setMobile.php', {method: 'POST', headers: {...HDR, 'Origin': 'https://cors-anywhere.herokuapp.com'}, body}),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 15000))
    ]);
    const t2 = await r2.text();
    ss('st1', 'Proxy: ' + t2.substring(0, 100), 'ok');
    setTimeout(() => show('s2'), 2000);
    btn.disabled = false;
    return;
  } catch(e2) {
    ss('st1', 'Proxy failed: ' + e2.message + ' — SMS may have been sent, proceed', 'wn');
    setTimeout(() => show('s2'), 3000);
  }

  btn.disabled = false;
}

async function doStep2() {
  const otp = document.getElementById('otp').value.replace(/\D/g, '');
  if (otp.length < 4) { ss('st2', 'Enter 4-6 digit OTP', 'er'); return; }
  const btn = document.getElementById('btn2');
  btn.disabled = true;
  ss('st2', 'Verifying OTP ' + otp + '...', 'wn');

  const body = 'event=chkCode&from=register&code=' + otp + '&mobile=85259144693';

  // Try direct first
  try {
    const r = await Promise.race([
      fetch(API + '/file/setMobile.php', {method: 'POST', headers: HDR, body}),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 12000))
    ]);
    const t = await r.text();
    document.getElementById('resp').textContent = t;
    ss('st2', 'Done!', 'ok');
    show('s3');
    btn.disabled = false;
    return;
  } catch(e1) {
    ss('st2', 'Direct CORS blocked, trying proxy...', 'wn');
  }

  // Try via cors-anywhere
  try {
    const r2 = await Promise.race([
      fetch(PROXY + API + '/file/setMobile.php', {method: 'POST', headers: {...HDR, 'Origin': 'https://cors-anywhere.herokuapp.com'}, body}),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 15000))
    ]);
    const t2 = await r2.text();
    document.getElementById('resp').textContent = t2;
    ss('st2', 'Done via proxy!', 'ok');
    show('s3');
  } catch(e2) {
    document.getElementById('resp').textContent = 'ERROR: ' + e2.message + '\nManual: POST to https://api.wetouch.me/file/setMobile.php\nBody: ' + body;
    ss('st2', 'Failed: ' + e2.message, 'er');
    show('s3');
  }

  btn.disabled = false;
}

function doCopy() {
  const t = document.getElementById('resp').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(t).then(() => alert('Copied!'));
  } else {
    const a = document.createElement('textarea');
    a.value = t; document.body.appendChild(a); a.select();
    document.execCommand('copy'); document.body.removeChild(a); alert('Copied!');
  }
}
</script>
</body>
</html>
