name: WeTouch Proxy
on:
  workflow_dispatch:
    inputs:
      event:
        type: string
        required: true
      requestId:
        type: string
        required: true
      captchaToken:
        type: string
        required: false
        default: ''
      otpCode:
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call WeTouch API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WT_TOKEN="9fa96a55ceb8d6c9160abcd74e1f62e7"
          EVENT="${{ inputs.event }}"
          REQ_ID="${{ inputs.requestId }}"
          CAPTCHA="${{ inputs.captchaToken }}"
          OTP="${{ inputs.otpCode }}"

          if [ "$EVENT" = "send-otp" ]; then
            BODY="event=sendCode&from=register&countryCode=852&number=59144693&captchaToken=${CAPTCHA}"
          else
            BODY="event=chkCode&from=register&code=${OTP}&mobile=85259144693"
          fi

          RESULT=$(curl -sk --connect-timeout 20 \
            -X POST "https://api.wetouch.me/file/setMobile.php" \
            -H "VERSION: 707" \
            -H "DEVICE: android" \
            -H "PHONEIMEI: 123456789012345" \
            -H "LOCALE: en" \
            -H "TOKEN: ${WT_TOKEN}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "User-Agent: okhttp/4.9.3" \
            -d "${BODY}")

          echo "RESULT=${RESULT}"

          python3 - <<PYEOF
import json, os, urllib.request
result = os.environ.get('RESULT', '${RESULT}')
req_id = '${REQ_ID}'
token = os.environ.get('GH_TOKEN', '')
payload = json.dumps({'description': 'wt-' + req_id, 'public': True,
  'files': {req_id + '.json': {'content': result or 'empty'}}}).encode()
req = urllib.request.Request('https://api.github.com/gists',
  data=payload, method='POST',
  headers={'Authorization': 'Bearer ' + token,
           'Accept': 'application/vnd.github+json',
           'Content-Type': 'application/json'})
resp = urllib.request.urlopen(req)
data = json.loads(resp.read())
print('Gist:', data.get('html_url'), 'ID:', data.get('id'))
PYEOF
