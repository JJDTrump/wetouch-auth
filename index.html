<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>WeTouch Auth</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,monospace;max-width:420px;margin:0 auto;padding:15px;background:#0d1117;color:#58a6ff;min-height:100vh}
h2{text-align:center;color:#58a6ff;margin:20px 0;font-size:18px}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;margin:15px 0}
.lbl{color:#8b949e;font-size:13px;margin-bottom:6px}
.val{color:#e6edf3;font-size:14px;word-break:break-all;padding:10px;background:#0d1117;border-radius:6px;border:1px solid #30363d}
button{width:100%;padding:16px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;margin:8px 0}
button:disabled{opacity:.4;cursor:not-allowed}
.st{padding:12px;border-radius:6px;font-size:13px;margin:8px 0;text-align:center;word-break:break-all}
.ok{background:#0d2818;border:1px solid #238636;color:#3fb950}
.er{background:#2d1117;border:1px solid #f85149;color:#f85149}
.wn{background:#1f1d0e;border:1px solid #bb8009;color:#d29922}
.step{display:none}
.active{display:block}
</style>
</head>
<body>
<h2>WeTouch OTP</h2>

<div id="s1" class="step active">
<div class="card">
<div class="lbl">Phone</div>
<div class="val">+852 59144693</div>
</div>
<div class="card">
<div id="st1" class="st wn">Tap to send OTP to +852 59144693</div>
<button id="btn1" onclick="doSend()">SEND OTP</button>
</div>
</div>

<div id="s2" class="step">
<div class="card">
<div id="st2" class="st ok">OTP sent! Waiting for SMS on +852 59144693...</div>
<p style="color:#8b949e;font-size:13px;margin:8px 0">You don't need to do anything else — the system will handle the rest automatically.</p>
</div>
</div>

<script src="https://www.google.com/recaptcha/enterprise.js?render=6LdrBgMsAAAAAK6Qq0c_-AnjXZhcIKjoV5WgnqGA"></script>
<script>
const SITEKEY = '6LdrBgMsAAAAAK6Qq0c_-AnjXZhcIKjoV5WgnqGA';
const RELAY = 'https://webhook.site/624077a0-f061-4372-9e07-cd6698e67eab';

function ss(id, msg, c) {
  var e = document.getElementById(id);
  e.textContent = msg;
  e.className = 'st ' + c;
}

async function doSend() {
  const btn = document.getElementById('btn1');
  btn.disabled = true;
  ss('st1', 'Loading reCAPTCHA...', 'wn');

  let rc = '';
  try {
    rc = await new Promise((res, rej) => {
      const to = setTimeout(() => rej(new Error('reCAPTCHA timeout')), 12000);
      if (typeof grecaptcha === 'undefined' || !grecaptcha.enterprise) {
        clearTimeout(to); rej(new Error('reCAPTCHA not available'));
        return;
      }
      grecaptcha.enterprise.ready(async () => {
        try {
          clearTimeout(to);
          res(await grecaptcha.enterprise.execute(SITEKEY, {action: 'sms'}));
        } catch(e) { clearTimeout(to); rej(e); }
      });
    });
    ss('st1', 'reCAPTCHA OK (len:' + rc.length + ') — sending to relay...', 'ok');
  } catch(e) {
    ss('st1', 'reCAPTCHA: ' + e.message + ' (sending anyway)', 'wn');
  }

  // Send reCAPTCHA token to relay (no CORS issues - simple POST, any origin)
  try {
    await fetch(RELAY, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'sendCode',
        captchaToken: rc,
        phone: '85259144693',
        ts: Date.now()
      })
    });
    document.getElementById('s1').style.display = 'none';
    document.getElementById('s2').style.display = 'block';
  } catch(e) {
    // Try no-cors as fallback (relay will still receive it)
    try {
      await fetch(RELAY, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action:'sendCode', captchaToken:rc, phone:'85259144693', ts:Date.now()})
      });
      document.getElementById('s1').style.display = 'none';
      document.getElementById('s2').style.display = 'block';
    } catch(e2) {
      ss('st1', 'Relay error: ' + e2.message, 'er');
      btn.disabled = false;
    }
  }
}
</script>
</body>
</html>
