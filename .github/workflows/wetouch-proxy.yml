name: WeTouch Proxy
on:
  workflow_dispatch:
    inputs:
      event:
        description: 'send-otp or verify-otp'
        required: true
      requestId:
        description: 'Unique request ID'
        required: true
      captchaToken:
        description: 'reCAPTCHA token'
        required: false
        default: ''
      otpCode:
        description: 'OTP code'
        required: false
        default: ''

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call WeTouch API and save to Gist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WT_TOKEN: "9fa96a55ceb8d6c9160abcd74e1f62e7"
          EVENT: ${{ inputs.event }}
          REQ_ID: ${{ inputs.requestId }}
          CAPTCHA: ${{ inputs.captchaToken }}
          OTP: ${{ inputs.otpCode }}
        run: |
          if [ "$EVENT" = "send-otp" ]; then
            BODY="event=sendCode&from=register&countryCode=852&number=59144693&captchaToken=${CAPTCHA}"
          else
            BODY="event=chkCode&from=register&code=${OTP}&mobile=85259144693"
          fi
          
          RESULT=$(curl -sk --connect-timeout 20 \
            -X POST "https://api.wetouch.me/file/setMobile.php" \
            -H "VERSION: 707" -H "DEVICE: android" -H "PHONEIMEI: 123456789012345" \
            -H "LOCALE: en" -H "TOKEN: ${WT_TOKEN}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "User-Agent: okhttp/4.9.3" \
            -d "${BODY}")
          
          echo "WeTouch API Result: $RESULT"
          
          # Save to GitHub Gist (public, no auth needed to read)
          GIST_PAYLOAD=$(python3 -c "
import json, os
result = os.environ.get('RESULT', '')
req_id = os.environ.get('REQ_ID', '')
print(json.dumps({'description': 'wt-result-' + req_id, 'public': True, 'files': {req_id + '.json': {'content': result or 'empty'}}}))
          " RESULT="$RESULT")
          
          curl -sk -X POST "https://api.github.com/gists" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "$GIST_PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Gist URL:', d.get('html_url','error'), 'Raw:', list(d.get('files',{}).values())[0].get('raw_url','') if d.get('files') else 'none')"
